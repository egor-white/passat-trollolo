<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>passat tech</title>
    <style>
        * {
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            background: #111;
            color: #fff;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-size: 2rem;
            cursor: default;
        }

        .apple-emoji {
            width: 1.5em;
            height: 1.5em;
            vertical-align: middle;
            object-fit: contain;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div>
        пр (хейт) 
        <img class="apple-emoji" src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f69c.png" alt="🚜">
    </div>

    <script>
        const emoji = "🚜";
        const text = " пассат уёбывает с рыбинска ";
        let fullText = emoji + text;
        
        setInterval(() => {
            fullText = fullText.substring(1) + fullText.substring(0, 1);
            document.title = fullText;
        }, 300);

        document.addEventListener('copy', (e) => {
            e.preventDefault();
        });
    </script>
</body>
</html>
